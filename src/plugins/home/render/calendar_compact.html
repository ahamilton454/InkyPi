<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: #222;
            background: #f8f8f8;
            overflow: hidden;
            width: {{ width }}px;
            height: {{ height }}px;
            padding: 3vh 4vw;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .section-label {
            font-size: 3vw;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: {{ calendar_color }};
            margin-bottom: 0.5vh;
        }
        .header {
            margin-bottom: 2vh;
            padding-bottom: 1.5vh;
            border-bottom: 2px solid #999;
        }
        .date {
            font-size: 6vw;
            font-weight: 700;
            color: #000;
        }
        .events {
            flex: 1;
            overflow: hidden;
        }
        .event {
            display: flex;
            align-items: flex-start;
            gap: 2.5vw;
            padding: 1.5vh 0;
            border-bottom: 1px solid #bbb;
        }
        .event:last-child {
            border-bottom: none;
        }
        .dot {
            width: 2.5vw;
            height: 2.5vw;
            border-radius: 50%;
            background: {{ calendar_color }};
            margin-top: 1vh;
            flex-shrink: 0;
        }
        .event-info {
            flex: 1;
            min-width: 0;
        }
        .event-title {
            font-size: 4vw;
            font-weight: 600;
            color: #000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .event-time {
            font-size: 3.2vw;
            color: #444;
            font-weight: 600;
        }
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
        }
        .empty-icon {
            font-size: 10vw;
            margin-bottom: 2vh;
        }
        .empty-text {
            font-size: 4.5vw;
            font-weight: 600;
            color: #777;
        }
        .empty-sub {
            font-size: 3vw;
            color: #999;
            margin-top: 1vh;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="section-label">{{ label }}</div>
            <div class="date">{{ date }}</div>
        </div>

        {% if events %}
        <div class="events">
            {% for event in events %}
            <div class="event">
                <div class="dot"></div>
                <div class="event-info">
                    <div class="event-title">{{ event.title }}</div>
                    <div class="event-time">{{ event.time }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="empty">
            <div class="empty-icon">&#9786;</div>
            <div class="empty-text">Nothing planned</div>
            <div class="empty-sub">Enjoy your free time</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
