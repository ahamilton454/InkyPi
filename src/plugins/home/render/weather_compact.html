<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: #000;
            background: #fff;
            overflow: hidden;
            width: {{ width }}px;
            height: {{ height }}px;
            padding: 2.5vh 3.5vw;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Current conditions */
        .now {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1.5vh;
            border-bottom: 2px solid #ddd;
        }
        .now-info {
            display: flex;
            flex-direction: column;
        }
        .now-label {
            font-size: 2.5vw;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }
        .now-temp-row {
            display: flex;
            align-items: baseline;
            gap: 0.5vw;
        }
        .temp {
            font-size: 10vw;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.5vw;
        }
        .unit {
            font-size: 3.5vw;
            font-weight: 600;
            color: #666;
        }
        .condition {
            font-size: 3.5vw;
            color: #555;
            margin-top: 0.3vh;
        }
        .now-icon {
            width: 11vw;
            height: 11vw;
            object-fit: contain;
        }

        /* 3-day forecast */
        .forecast {
            width: 100%;
            display: flex;
            gap: 1.5vw;
        }
        .forecast-day {
            flex: 1;
            text-align: center;
            background: #efefef;
            border-radius: 2.5vw;
            padding: 1vh 1vw;
        }
        .day-name {
            display: block;
            font-size: 3.2vw;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3vh;
        }
        .day-icon {
            width: 7vw;
            height: 7vw;
            object-fit: contain;
            display: block;
            margin: 0 auto 0.3vh;
        }
        .temps {
            margin-bottom: 0.3vh;
        }
        .hi {
            font-size: 4.5vw;
            font-weight: 700;
        }
        .lo {
            font-size: 3.5vw;
            color: #999;
            margin-left: 0.5vw;
        }
        .detail {
            font-size: 3vw;
            line-height: 1.4;
        }
        .rain {
            color: #2e7dba;
            font-weight: 600;
            display: block;
        }
        .uv {
            color: #777;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="now">
            <div class="now-info">
                <span class="now-label">Now</span>
                <div class="now-temp-row">
                    <span class="temp">{{ current_temperature }}</span>
                    <span class="unit">{{ temperature_unit }}</span>
                </div>
                <span class="condition">{{ condition_text }}</span>
            </div>
            <img src="file://{{ weather_icon }}" alt="" class="now-icon">
        </div>

        <div class="forecast">
            {% for day in forecast_days %}
            <div class="forecast-day">
                <span class="day-name">{{ day.name }}</span>
                <img src="file://{{ day.icon }}" alt="" class="day-icon">
                <div class="temps">
                    <span class="hi">{{ day.high }}&deg;</span>
                    <span class="lo">{{ day.low }}&deg;</span>
                </div>
                <div class="detail">
                    {% if day.rain > 0 %}
                    <span class="rain">&#9730; {{ day.rain }}%</span>
                    {% endif %}
                    <span class="uv">UV {{ day.uv }}</span>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
