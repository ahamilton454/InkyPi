<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: #000;
            background: #fff;
            overflow: hidden;
            width: 400px;
            height: 240px;
            padding: 10px 14px;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Current conditions */
        .now {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 6px;
            border-bottom: 2px solid #ddd;
        }
        .now-info {
            display: flex;
            flex-direction: column;
        }
        .now-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }
        .now-temp-row {
            display: flex;
            align-items: baseline;
            gap: 3px;
        }
        .temp {
            font-size: 44px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -2px;
        }
        .unit {
            font-size: 14px;
            font-weight: 600;
            color: #666;
        }
        .condition {
            font-size: 13px;
            color: #555;
            margin-top: 1px;
        }
        .now-icon {
            width: 44px;
            height: 44px;
            max-width: 44px;
            max-height: 44px;
            object-fit: contain;
        }

        /* Today outlook */
        .outlook {
            font-size: 11px;
            color: #444;
            padding: 4px 0;
            line-height: 1.3;
        }

        /* 3-day forecast */
        .forecast {
            width: 100%;
            table-layout: fixed;
            border-collapse: separate;
            border-spacing: 6px 0;
        }
        .forecast td {
            text-align: center;
            vertical-align: top;
            background: #efefef;
            border-radius: 10px;
            padding: 6px 4px 5px;
        }
        .day-name {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .day-icon {
            width: 24px;
            height: 24px;
            max-width: 24px;
            max-height: 24px;
            object-fit: contain;
            display: block;
            margin: 0 auto 2px;
        }
        .temps {
            margin-bottom: 2px;
        }
        .hi {
            font-size: 15px;
            font-weight: 700;
        }
        .lo {
            font-size: 12px;
            color: #999;
            margin-left: 3px;
        }
        .detail {
            font-size: 10px;
            line-height: 1.4;
        }
        .rain {
            color: #2e7dba;
            font-weight: 600;
            display: block;
        }
        .uv {
            color: #777;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="now">
            <div class="now-info">
                <span class="now-label">Now</span>
                <div class="now-temp-row">
                    <span class="temp">{{ current_temperature }}</span>
                    <span class="unit">{{ temperature_unit }}</span>
                </div>
                <span class="condition">{{ condition_text }}</span>
            </div>
            <img src="file://{{ weather_icon }}" alt="" class="now-icon" width="44" height="44">
        </div>

        {% if today_outlook %}
        <div class="outlook">{{ today_outlook }}</div>
        {% endif %}

        <table class="forecast">
            <tr>
                {% for day in forecast_days %}
                <td>
                    <span class="day-name">{{ day.name }}</span>
                    <img src="file://{{ day.icon }}" alt="" class="day-icon" width="24" height="24">
                    <div class="temps">
                        <span class="hi">{{ day.high }}°</span>
                        <span class="lo">{{ day.low }}°</span>
                    </div>
                    <div class="detail">
                        {% if day.rain > 0 %}
                        <span class="rain">&#9730; {{ day.rain }}%</span>
                        {% endif %}
                        <span class="uv">UV {{ day.uv }}</span>
                    </div>
                </td>
                {% endfor %}
            </tr>
        </table>
    </div>
</body>
</html>
