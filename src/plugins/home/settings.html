<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<div class="form-group">
    <label class="form-label">Calendar ICS URL:</label>
    <input type="text" id="calendarURL" name="calendarURL" class="form-input" placeholder="https://calendar.google.com/calendar/ical/..." />
    <small style="color: #666; display: block; margin-top: 4px;">
        Get this from Google Calendar → Settings → Integrate calendar → "Secret address in iCal format"
    </small>
</div>

<div class="form-group">
    <label class="form-label">Calendar Color:</label>
    <input type="color" id="calendarColor" name="calendarColor" class="color-picker" value="#4285f4">
</div>

<div class="form-group">
    <label class="form-label">Location: </label>
    <div class="form-group">
        <span>Latitude </span>
        <input readonly type="text" id="latitude" name="latitude" class="form-input" />
    </div>
    <div class="form-group">
        <span>Longitude </span>
        <input readonly type="text" id="longitude" name="longitude" class="form-input" />
    </div>
    <button type="button" id="openMap" class="action-button compact">Select Location</button>
</div>

<div class="form-group">
    <label for="units" class="form-label">Temperature Units:</label>
    <select id="units" name="units" class="form-input">
        <option value="imperial">Imperial (°F)</option>
        <option value="metric">Metric (°C)</option>
    </select>
    <small style="color: #666; display: block; margin-top: 4px;">
        Weather data provided by Open-Meteo (free, no API key needed!)
    </small>
</div>

<div class="form-group">
    <label for="randomizeApod" class="form-label">Randomize NASA Image</label>
    <div class="toggle-container">
        <input type="checkbox" id="randomizeApod" name="randomizeApod" class="toggle-checkbox" value="false"
            onclick="this.value = this.checked ? 'true' : 'false';">
        <label for="randomizeApod" class="toggle-label"></label>
    </div>
    <small style="color: #666; display: block; margin-top: 4px;">
        When enabled, shows a random NASA APOD image instead of today's
    </small>
</div>

<script>
    // Map functionality (borrowed from weather plugin)
    let map;
    let marker;

    document.getElementById('openMap').addEventListener('click', function() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center;';

        const mapContainer = document.createElement('div');
        mapContainer.style.cssText = 'background: white; padding: 20px; border-radius: 8px; width: 80%; max-width: 800px;';
        mapContainer.innerHTML = `
            <h3 style="margin-top: 0;">Select Location</h3>
            <div id="map" style="height: 400px; margin: 10px 0;"></div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" class="action-button" id="confirmLocation">Confirm</button>
                <button type="button" class="action-button" id="cancelLocation">Cancel</button>
            </div>
        `;

        modal.appendChild(mapContainer);
        document.body.appendChild(modal);

        // Initialize map
        const currentLat = parseFloat(document.getElementById('latitude').value) || 40.7128;
        const currentLng = parseFloat(document.getElementById('longitude').value) || -74.0060;

        map = L.map('map').setView([currentLat, currentLng], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        marker = L.marker([currentLat, currentLng], {draggable: true}).addTo(map);

        marker.on('dragend', function(e) {
            const pos = marker.getLatLng();
            document.getElementById('latitude').value = pos.lat.toFixed(6);
            document.getElementById('longitude').value = pos.lng.toFixed(6);
        });

        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            document.getElementById('latitude').value = e.latlng.lat.toFixed(6);
            document.getElementById('longitude').value = e.latlng.lng.toFixed(6);
        });

        document.getElementById('confirmLocation').addEventListener('click', function() {
            document.body.removeChild(modal);
        });

        document.getElementById('cancelLocation').addEventListener('click', function() {
            document.body.removeChild(modal);
        });

        setTimeout(() => map.invalidateSize(), 100);
    });

    // Load saved settings
    document.addEventListener('DOMContentLoaded', () => {
        if (loadPluginSettings && pluginSettings) {
            const $calendarURL = document.getElementById('calendarURL');
            const $calendarColor = document.getElementById('calendarColor');
            const $latitude = document.getElementById('latitude');
            const $longitude = document.getElementById('longitude');
            const $units = document.getElementById('units');
            const $randomizeApod = document.getElementById('randomizeApod');

            if (pluginSettings.calendarURL) $calendarURL.value = pluginSettings.calendarURL;
            if (pluginSettings.calendarColor) $calendarColor.value = pluginSettings.calendarColor;
            if (pluginSettings.latitude) $latitude.value = pluginSettings.latitude;
            if (pluginSettings.longitude) $longitude.value = pluginSettings.longitude;
            if (pluginSettings.units) $units.value = pluginSettings.units;

            $randomizeApod.checked = pluginSettings.randomizeApod === 'true';
            $randomizeApod.value = pluginSettings.randomizeApod || 'false';
        }
    });
</script>
